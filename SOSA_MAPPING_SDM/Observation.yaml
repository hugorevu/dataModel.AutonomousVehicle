type: object
title: Observation
description:  Represents an observation generated by a sensor within an autonomous vehicle system.
  It captures the measurement of a specific property at a given time, including
  the relationship to the sensor that produced it and the resulting value obtained.
properties:
  dateObserved:
    description: The result time is the instant of time when the Observation, Actuation
      or Sampling activity was completed.
    format: date-time
    type: string
    x-ngsi:
      model: https://schema.org/Text
      type: Property
  type:
    description: NGSI entity type. It must be equal to Observation
    type: string
    enum:
      - Observation
    x-ngsi:
      type: Property
  hasResult:
    description: Relation linking an Observation and a Result.
    type: string
    format: uri
    x-ngsi:
      type: Relationship
  madeBySensor:
    description: Relation between an Observation and the Sensor that made it.
    type: string
    format: uri
    x-ngsi:
      type: Relationship
required:
- id
- type
