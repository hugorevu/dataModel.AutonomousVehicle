allOf:
  - $ref: "Result.yaml"
  - type: object
    description: Result of a GNSS observation.
    properties:
      type:
        type: string
        enum:
          - GNSSResult
        x-ngsi:
          type: Property

      value:
        type: object
        x-ngsi:
          type: Property
        properties:
          latitude:
            type: number
            format: float
          longitude:
            type: number
            format: float
          altitude:
            type: number
            format: float
    required:
      - id
      - type
      - value