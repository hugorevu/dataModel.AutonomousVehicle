    # Plataformas
    Platform:
      $ref: "https://raw.githubusercontent.com/hugorevu/VehicleSDM/main/modelo/Platform.yaml"

    # Sensores
    Sensor:
      $ref: "https://raw.githubusercontent.com/hugorevu/VehicleSDM/main/modelo/Sensor.yaml"
    CameraRGB:
      $ref: "https://raw.githubusercontent.com/hugorevu/VehicleSDM/main/modelo/CameraRGB.yaml"
    GNSS:
      $ref: "https://raw.githubusercontent.com/hugorevu/VehicleSDM/main/modelo/GNSS.yaml"

    # Observaciones
    Observation:
      $ref: "https://raw.githubusercontent.com/hugorevu/VehicleSDM/main/modelo/Observation.yaml"
    FrameObservation:
      $ref: "https://raw.githubusercontent.com/hugorevu/VehicleSDM/main/modelo/FrameObservation.yaml"
