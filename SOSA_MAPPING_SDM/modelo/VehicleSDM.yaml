    FrameResult:
      $ref: "https://raw.githubusercontent.com/hugorevu/VehicleSDM/main/modelo/FrameResult.yaml"
    GNSSResult:
      $ref: "https://raw.githubusercontent.com/hugorevu/VehicleSDM/main/modelo/GNSSResult.yaml"